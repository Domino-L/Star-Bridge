<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111a"/>
      <stop offset="0.45" stop-color="#061824"/>
      <stop offset="1" stop-color="#03080d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2233" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#050d16" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="panelSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102b3e" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#06101a" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ec9ff"/>
      <stop offset="0.52" stop-color="#1f86c2"/>
      <stop offset="1" stop-color="#0d3f63"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#13445c" stroke-width="1" opacity="0.28"/>
    </pattern>
    <pattern id="scanline" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 0 7.5 L 8 7.5" stroke="#1aaee5" stroke-width="0.8" opacity="0.12"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 24px "Microsoft YaHei UI", "Segoe UI", sans-serif; fill: #f4fbff; }
      .logo { font: 800 54px "Segoe UI", "Microsoft YaHei UI", sans-serif; fill: #eaf5ff; letter-spacing: 1px; }
      .logo2 { font: 800 54px "Segoe UI", "Microsoft YaHei UI", sans-serif; fill: #79b8ff; letter-spacing: 1px; }
      .h1 { font: 800 36px "Microsoft YaHei UI", "Segoe UI", sans-serif; fill: #56c7ff; }
      .h2 { font: 700 22px "Microsoft YaHei UI", "Segoe UI", sans-serif; fill: #eaf7ff; }
      .h3 { font: 700 16px "Microsoft YaHei UI", "Segoe UI", sans-serif; fill: #9fdfff; letter-spacing: 1px; }
      .body { font: 500 16px "Microsoft YaHei UI", "Segoe UI", sans-serif; fill: #c6d9e8; }
      .small { font: 500 13px "Microsoft YaHei UI", "Segoe UI", sans-serif; fill: #8fb4c8; }
      .tiny { font: 600 11px "Segoe UI", "Microsoft YaHei UI", sans-serif; fill: #6fa5bd; letter-spacing: 1px; }
      .cyan { fill: #4fc8ff; }
      .green { fill: #61f2b5; }
      .warn { fill: #ffd66b; }
      .muted { fill: #6e8da0; }
      .line { stroke: #2fbdf6; stroke-width: 1.4; opacity: 0.95; }
      .lineSoft { stroke: #1c7fa8; stroke-width: 1; opacity: 0.62; }
      .panelRect { fill: url(#panel); stroke: #2fbdf6; stroke-width: 1.4; }
      .panelSoft { fill: url(#panelSoft); stroke: #1c7fa8; stroke-width: 1.1; }
      .buttonRect { fill: url(#button); stroke: #6ed6ff; stroke-width: 1.2; }
      .ghostButton { fill: #061827; stroke: #2fbdf6; stroke-width: 1.1; }
      .tabActive { fill: #102f46; stroke: #4fc8ff; stroke-width: 1.4; }
      .tab { fill: #061827; stroke: #1c7fa8; stroke-width: 1.1; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#scanline)"/>

  <path d="M0 1010 C420 960 760 1060 1160 1005 C1460 964 1730 1008 1920 966 L1920 1080 L0 1080 Z" fill="#03131d" opacity="0.72"/>
